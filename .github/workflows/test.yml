name: Automation Testing

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  ensure-company-core:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ensure EPAM exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          # Check if EPAM exists
          EXISTING=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:33159615&rows=1" | jq '.response.numFound')
          
          echo "EPAM count in company core: $EXISTING"
          
          # Add only if not exists
          if [ "$EXISTING" -eq "0" ]; then
            echo "EPAM not found - adding to company core..."
            echo '[{"id":"33159615","company":"EPAM SYSTEMS INTERNATIONAL SRL","brand":"EPAM","status":"activ","location":["Bucuresti"],"lastScraped":"2026-04-14","scraperFile":"https://raw.githubusercontent.com/sebiboga/epam-systems-international-srl-nodejs-scraper/master/.github/workflows/scrape.yml"}]' > company_data.json
            
            curl -s --user "${SOLR_AUTH}" \
              "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary @company_data.json
          else
            echo "EPAM already exists in company core - no action needed"
          fi
          
          # Verify
          FINAL=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:33159615&rows=1" | jq '.response.numFound')
          
          echo "EPAM count after check: $FINAL"
          
          if [ "$FINAL" -ge "1" ]; then
            echo "✅ SUCCESS: EPAM is in company core"
          else
            echo "❌ FAILED: EPAM still not in company core"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
          
      - name: Run tests
        run: npm test
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}